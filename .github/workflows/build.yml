name: Go Cross Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 원하는 Go 버전

      - name: Build for AMD64
        run: |
          GOOS=linux GOARCH=amd64 go build -o subtrace-x86_64 main.go
          
      - name: Build for ARM64
        run: |
          GOOS=linux GOARCH=arm64 go build -o subtrace-aarch64 main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            subtrace-amd64
            subtrace-arm64
